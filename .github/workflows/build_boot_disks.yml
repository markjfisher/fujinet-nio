name: Build boot disks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  boot-disks:
    runs-on: ubuntu-latest

    env:
      WORKSPACE_DIR: nio-workspace

    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: markjfisher/fujinet-nio-workspace
          path: ${{ env.WORKSPACE_DIR }}
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.NIO_WORKSPACE_TOKEN || github.token }}

      - name: Checkout build fujinet-nio revision
        uses: actions/checkout@v4
        with:
          path: ${{ env.WORKSPACE_DIR }}/repos/fujinet-nio
          submodules: recursive
          fetch-depth: 0

      - name: Checkout fujinet-nio-lib
        uses: actions/checkout@v4
        with:
          repository: markjfisher/fujinet-nio-lib
          path: ${{ env.WORKSPACE_DIR }}/repos/fujinet-nio-lib
          fetch-depth: 0
          token: ${{ secrets.NIO_WORKSPACE_TOKEN || github.token }}

      - name: Checkout nio-apps
        uses: actions/checkout@v4
        with:
          repository: markjfisher/nio-apps
          path: ${{ env.WORKSPACE_DIR }}/repos/nio-apps
          fetch-depth: 0
          token: ${{ secrets.NIO_WORKSPACE_TOKEN || github.token }}

      - name: Checkout fn-rom
        uses: actions/checkout@v4
        with:
          repository: markjfisher/fn-rom
          path: ${{ env.WORKSPACE_DIR }}/repos/fn-rom
          fetch-depth: 0
          token: ${{ secrets.NIO_WORKSPACE_TOKEN || github.token }}

      - name: Checkout cc65
        uses: actions/checkout@v4
        with:
          repository: markjfisher/cc65
          ref: bbc-clib
          path: ${{ env.WORKSPACE_DIR }}/repos/cc65
          fetch-depth: 0
          token: ${{ secrets.NIO_WORKSPACE_TOKEN || github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            dosfstools \
            g++ \
            git \
            mtools \
            python3 \
            python3-venv \
            zip

      - name: Build dir2atr
        run: |
          git clone --depth 1 https://github.com/HiassofT/AtariSIO.git /tmp/AtariSIO
          make -C /tmp/AtariSIO/tools -f Makefile.posix
          echo "/tmp/AtariSIO/tools" >> "$GITHUB_PATH"

      - name: Build cc65
        working-directory: ${{ env.WORKSPACE_DIR }}/repos/cc65
        run: |
          make -j"$(nproc)"
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Setup Open Watcom
        uses: open-watcom/setup-watcom@v0
        with:
          target: dos

      - name: Build boot disks
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          ./scripts/build.sh boot-disks

      - name: Upload boot disk artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fujinet-nio-boot-disks-${{ github.run_id }}
          path: |
            ${{ env.WORKSPACE_DIR }}/repos/fujinet-nio/distfiles/boot/atari/autorun.atr
            ${{ env.WORKSPACE_DIR }}/repos/fujinet-nio/distfiles/boot/bbc/autorun.ssd
            ${{ env.WORKSPACE_DIR }}/repos/fujinet-nio/distfiles/boot/msdos/autorun.img
            ${{ env.WORKSPACE_DIR }}/build/logs/**
          if-no-files-found: warn
