[fujinet]
build_board    = fujibus-gpio-rs232-uart-log-rev0

[env]
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[env:fujibus-gpio-rs232-uart-log-rev0]
platform = espressif32@${fujinet.esp32s3_platform_version}
platform_packages = ${fujinet.esp32s3_platform_packages}
board = rs232-esp32-v1-8mb
build_type = debug
build_flags =
    ${env.build_flags}
    -DFN_BUILD_ESP32_FUJIBUS_GPIO
    -DFN_PLATFORM_ESP32
    -DFN_PINMAP_DEFAULT=FN_PINMAP_RS232_REV0
board_build.cmake_extra_args = -D CONFIG_IDF_TARGET_ESP32=1
