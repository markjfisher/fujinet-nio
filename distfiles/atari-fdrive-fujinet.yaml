fujinet:
  device_name: "atari-fdrive-test"

boot:
  mode: "normal"
  config_uri: "persist:/boot/autorun.atr"
  readonly: true

wifi:
  enabled: false
  ssid: ""
  passphrase: ""

# fdrive.xex displays 0-based user slots. These persisted config slots are
# 1-based, so slot 1 appears as "slot 0", slot 2 as "slot 1", and so on.
mounts:
  - slot: 1
    uri: "host:/disks/slot0-fdrive-test.atr"
    mode: "r"
    enabled: true
  - slot: 2
    uri: "host:/disks/slot1-readwrite-test.atr"
    mode: "rw"
    enabled: true
  - slot: 3
    uri: "tnfs://fujinet.online/atari/fujinet-nio-slot2.atr"
    mode: "r"
    enabled: true

devices:
  modem:
    enabled: false
    sniffer_enabled: false
  cpm:
    enabled: false
    ccp_image: ""
  printer:
    enabled: false

netsio:
  enabled: true
  host: "localhost"
  port: __NETSIO_PORT__

clock:
  timezone: "UTC"
  enabled: true
