group: Filesystem
steps:
  - name: "FS: list (root)"
    argv: ["{CLI}", "list", "host:/"]
    expect:
      - ":/|host|flash|sd|config"
    timeout_s: 8

  - name: "FS: write UTF-8 content to ASCII filename"
    argv: ["{CLI}", "write", "host:/utf8_content.txt", "integration-tests/data/fs_utf8.txt"]
    timeout_s: 15

  - name: "FS: read-all UTF-8 content back"
    argv: ["{CLI}", "read-all", "host:/utf8_content.txt"]
    expect:
      - "héllö"
      - "こんにちは"
      - "🌍"
    timeout_s: 15

  - name: "FS: write large file (>512 bytes) in chunks"
    argv: ["{CLI}", "write", "--chunk", "256", "host:/large_1k.bin", "integration-tests/data/fs_large_1k.bin"]
    expect:
      # this is generating the file on the target, no expectation here
      - ""
    timeout_s: 20

  - name: "FS: read-all large file back (sanity substring)"
    argv: ["{CLI}", "read-all", "host:/large_1k.bin"]
    capture:
      mode: "file"
    expect_file:
      path: "{CAPTURED_OUT}"
      contains_text:
        - "FUJINET-NIO-LARGE-FILE"
      size_exact: 1047
      sha256: "2e0e69f4a65e592c62ab244667711eb5dd81310cdde5929c7162ad2b9329da7c"
    timeout_s: 20

  - name: "FS: UTF-8 filename (write)"
    argv: ["{CLI}", "write", "host:/utf8_こんにちは🌍.txt", "integration-tests/data/fs_utf8.txt"]
    timeout_s: 20

  - name: "FS: UTF-8 filename (read-all)"
    argv: ["{CLI}", "read-all", "host:/utf8_こんにちは🌍.txt"]
    expect:
      - "こんにちは"
      - "🌍"
    timeout_s: 20
