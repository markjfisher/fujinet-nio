group: TNFS
steps:
  - name: "TNFS: list (root directory)"
    argv: ["{CLI}", "list", "tnfs", "//localhost/test"]
    expect:
      - "test.txt"
      - "subdir"
    timeout_s: 10

  - name: "TNFS: stat test.txt"
    argv: ["{CLI}", "stat", "tnfs", "//localhost/test/test.txt"]
    expect:
      - "exists: True"
      - "dir:    False"
    timeout_s: 10

  - name: "TNFS: read test.txt content"
    argv: ["{CLI}", "read-all", "tnfs", "//localhost/test/test.txt"]
    expect:
      - "Test file content"
    timeout_s: 10

  - name: "TNFS: read subdir/subfile.txt"
    argv: ["{CLI}", "read-all", "tnfs", "//localhost/test/subdir/subfile.txt"]
    expect:
      - "Subdirectory file content"
    timeout_s: 10
